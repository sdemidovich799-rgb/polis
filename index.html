<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ХРАМ 5.8</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #00a884; --text: #e9edef; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        .boot-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 18px; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .main-ui { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .card { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        input { background: #2a3942; border: none; color: white; padding: 15px; border-radius: 10px; width: 100%; margin: 10px 0; font-size: 16px; }
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 8px; max-width: 85%; word-wrap: break-word; }
        .own { align-self: flex-end; background: #054740; border-right: 4px solid var(--accent); }
        .ext { align-self: flex-start; background: #202c33; border-left: 4px solid #34b7f1; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 30px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <div id="app">
        <!-- КНОПКА ДЕТОНАТОР (Только она на старте) -->
        <div v-if="!isBooted" class="boot-screen">
            <h1 style="margin-bottom: 30px;">ХРАМ 5.8</h1>
            <button class="btn" @click="detonate">⚡️ АКТИВИРОВАТЬ ХРАМ</button>
            <p style="margin-top: 30px; color: #8696a0; font-size: 14px; text-align: center;">
                Нажмите для доступа к сенсорам <br> и входа в эфир.
            </p>
        </div>

        <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
        <template v-if="isBooted">
            <div class="header">
                <div style="font-weight: bold;">{{ nodeId }}</div>
                <div @click="showSettings = !showSettings" style="font-size: 24px;">⚙️</div>
            </div>

            <div class="main-ui">
                <!-- Меню -->
                <div v-if="showSettings" class="card">
                    <button class="btn" style="background: #34b7f1; margin-bottom: 10px;" @click="startEmp">🧠 Эмпатия</button>
                    <button class="btn" @click="showSlot = true">📦 Создать Слот</button>
                    <button class="btn" style="background: #444;" @click="reload">🔄 Сброс</button>
                </div>

                <!-- Лента -->
                <div v-for="m in messages" :key="m.id" class="msg" :class="m.sender === nodeId ? 'own' : 'ext'">
                    <div style="font-size: 10px; color: #8696a0;">{{ m.sender }}</div>
                    <div v-if="m.type === 'SLOT'">
                        <h3 style="color: var(--accent); margin: 5px 0;">🛒 {{ m.title }}</h3>
                        <p>{{ m.body }}</p>
                        <b>{{ m.price }} XMR</b>
                    </div>
                    <div v-else>{{ m.body }}</div>
                    <div v-if="m.truth" style="color: #0f0; font-size: 11px; margin-top: 5px;">Искренность: {{ m.truth }}%</div>
                </div>
            </div>

            <div class="header" style="padding: 10px;">
                <input v-model="input" @keyup.enter="send('TEXT')" placeholder="Введите сообщение...">
            </div>
        </template>

        <!-- МОДАЛКА ЭМПАТИИ -->
        <div v-if="empActive" class="modal">
            <h3>{{ empStep === 'target' ? 'ЦЕЛЬ' : `ШАГ ${empStep+1}/3` }}</h3>
            <h2 style="margin: 40px 0;">{{ empQuest }}</h2>
            <div style="display: flex; gap: 15px;">
                <button class="btn" @click="handleEmp(true)">ДА</button>
                <button class="btn" style="background: #f15c6d;" @click="handleEmp(false)">НЕТ</button>
            </div>
        </div>

        <!-- МОДАЛКА СЛОТА -->
        <div v-if="showSlot" class="modal">
            <h3>НОВЫЙ СЛОТ</h3>
            <input v-model="slot.title" placeholder="Что продаем?">
            <input v-model="slot.body" placeholder="Описание">
            <input type="number" v-model="slot.price" placeholder="Цена">
            <button class="btn" @click="postSlot">Опубликовать</button>
            <button class="btn" style="background: #444; margin-top: 10px;" @click="showSlot = false">Отмена</button>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const isBooted = ref(false), isLogged = ref(false), nodeId = ref(''), input = ref(''), messages = ref([]), showSettings = ref(false);
                const showSlot = ref(false), slot = ref({title:'', body:'', price:''}), empActive = ref(false), empStep = ref(0), empQuest = ref(''), baseJ = ref(0), calib = [];
                let client, secret = '';

                // Главный метод активации
                const detonate = async () => {
                    try {
                        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                            const res = await DeviceMotionEvent.requestPermission();
                            if (res !== 'granted') return alert("Нужен доступ к сенсорам!");
                        }
                        isBooted.value = true;
                        bootUp();
                    } catch (e) { isBooted.value = true; bootUp(); }
                };

                const bootUp = () => {
                    let s = [];
                    const h = e => { if(e.accelerationIncludingGravity) s.push(Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2)); };
                    window.addEventListener('devicemotion', h);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        let d = 0; for(let i=1; i<s.length; i++) d += Math.abs(s[i]-s[i-1]);
                        if(d === 0) d = Math.random(); 
                        secret = CryptoJS.SHA256(d.toString()).toString();
                        nodeId.value = 'NODE_' + secret.substring(0,4).toUpperCase();
                        initMqtt();
                    }, 2000);
                };

                const initMqtt = () => {
                    client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                    client.on('connect', () => { client.subscribe('hram_final_v58'); });
                    client.on('message', (t, m) => { try { messages.value.push(JSON.parse(m.toString())); } catch(e){} });
                };

                const send = (type, data = null) => {
                    const p = data || { id: Date.now(), sender: nodeId.value, type, body: input.value };
                    client.publish('hram_final_v58', JSON.stringify(p));
                    input.value = '';
                };

                const postSlot = () => { send('SLOT', { id: Date.now(), sender: nodeId.value, type: 'SLOT', ...slot.value }); showSlot.value = false; };
                const startEmp = () => { empStep.value = 0; empQuest.value = "1 + 1 = 2?"; calib.length = 0; empActive.value = true; showSettings.value = false; };

                const handleEmp = (ans) => {
                    let m = 0; const h = e => { if(e.accelerationIncludingGravity) m = Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2); };
                    window.addEventListener('devicemotion', h);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        if(empStep.value === 'target') {
                            const truth = Math.max(0, Math.min(100, 100 - (Math.abs(m-baseJ.value)*80))).toFixed(0);
                            send('TEXT', { id: Date.now(), sender: nodeId.value, type: 'VERIFY', body: 'ПОДТВЕРЖДЕНО ЭМПАТИЕЙ', truth });
                            empActive.value = false; return;
                        }
                        calib.push(m); empStep.value++;
                        if(empStep.value < 3) empQuest.value = "Вы человек?";
                        else { baseJ.value = calib.reduce((a,b)=>a+b,0)/3; empStep.value = 'target'; empQuest.value = "СДЕЛКА ЧЕСТНАЯ?"; }
                    }, 250);
                };

                return { isBooted, nodeId, input, messages, showSettings, showSlot, slot, empActive, empStep, empQuest, detonate, send, postSlot, startEmp, handleEmp, reload: () => location.reload() };
            }
        }).mount('#app');
    </script>
</body>
</html>
