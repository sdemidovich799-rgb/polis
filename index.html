<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ХРАМ 5.5 | СРЕТЕНИЕ</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #00a884; --text: #e9edef; --dim: #8696a0; --danger: #f15c6d; --blue: #34b7f1; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        .header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; background: #555; }
        .online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .main { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .card { background: var(--panel); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .msg-own { align-self: flex-end; border-right: 3px solid var(--accent); background: #054740; }
        .msg-ext { align-self: flex-start; border-left: 3px solid var(--blue); }
        .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 4px 0; }
        .btn:active { opacity: 0.7; }
        .btn-blue { background: var(--blue); }
        .terminal { background: #000; color: #0f0; font-family: monospace; padding: 8px; border-radius: 6px; font-size: 11px; max-height: 100px; overflow-y: auto; margin-top: 5px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        input, select { background: #2a3942; border: none; color: white; padding: 12px; border-radius: 8px; width: 100%; margin: 8px 0; outline: none; }
        .badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; background: rgba(0,0,0,0.3); color: var(--dim); }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="!isLogged" class="modal">
            <h2 style="text-align:center">ХРАМ 5.5</h2>
            <button class="btn" @click="entropyBoot">🌀 Вход по гироскопу</button>
            <div class="terminal" v-if="logs.length"><div v-for="log in logs">> {{ log }}</div></div>
        </div>

        <template v-else>
            <div class="header">
                <div><span class="status-dot" :class="{online: connected}"></span> {{ nodeId }}</div>
                <div @click="showSettings = !showSettings">⚙️</div>
            </div>

            <div class="main">
                <div v-if="showSettings" class="card">
                    <button class="btn btn-blue" @click="startEmpathy">🧠 Проверка Эмпатии</button>
                    <button class="btn" @click="showSlotModal = true">📦 Создать Слот (Товар)</button>
                    <button class="btn" style="background:#444" @click="isLogged = false">Выход</button>
                </div>

                <div v-for="m in messages" :key="m.id" class="card" :class="m.sender === nodeId ? 'msg-own' : 'msg-ext'">
                    <div style="font-size:10px; color:var(--dim); margin-bottom:4px;">{{ m.sender }} <span class="badge">{{ m.type }}</span></div>
                    <div v-if="m.type === 'SLOT'">
                        <div style="color:var(--accent); font-weight:bold">🛒 {{ m.title }}</div>
                        <div>{{ m.body }}</div>
                        <div style="margin-top:5px; font-size:1.2em">{{ m.price }} XMR</div>
                        <button v-if="m.sender !== nodeId" class="btn" style="margin-top:10px" @click="buySlot(m)">КУПИТЬ</button>
                    </div>
                    <div v-else>{{ m.body }}</div>
                    <div v-if="m.truth" style="font-size:10px; color:#0f0">Искренность: {{ m.truth }}%</div>
                </div>
            </div>

            <div class="header" style="border-top:1px solid rgba(255,255,255,0.1)">
                <input v-model="input" @keyup.enter="sendMsg" placeholder="Сообщение или Слот...">
            </div>
        </template>

        <div v-if="showSlotModal" class="modal">
            <h3>Новый Слот</h3>
            <input v-model="slotData.title" placeholder="Название товара">
            <input v-model="slotData.body" placeholder="Описание и доставка">
            <input type="number" v-model="slotData.price" placeholder="Цена в XMR">
            <button class="btn" @click="createSlot">Опубликовать в ХРАМ</button>
            <button class="btn" style="background:#444" @click="showSlotModal = false">Отмена</button>
        </div>

        <div v-if="empathyActive" class="modal" style="text-align:center">
            <h3>{{ empStep === 'target' ? 'ЦЕЛЬ' : `Калибровка ${empStep+1}/3` }}</h3>
            <h2 style="margin:20px 0">{{ empQuest }}</h2>
            <div style="display:flex; gap:10px">
                <button class="btn" @click="recEmp(true)">ДА</button>
                <button class="btn" style="background:var(--danger)" @click="recEmp(false)">НЕТ</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const isLogged = ref(false), nodeId = ref(''), connected = ref(false), input = ref(''), logs = ref([]), messages = ref([]), showSettings = ref(false);
                const showSlotModal = ref(false), slotData = ref({title:'', body:'', price:''}), empathyActive = ref(false), empStep = ref(0), empQuest = ref(''), baseJ = ref(0), calib = [];
                let client, secretKey = '';

                const log = m => { logs.value.unshift(m); if(logs.value.length>5) logs.value.pop(); };

                const entropyBoot = async () => {
                    log("Замер энтропии...");
                    if(window.DeviceMotionEvent?.requestPermission) await DeviceMotionEvent.requestPermission();
                    let s = [];
                    const h = e => s.push(Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2));
                    window.addEventListener('devicemotion', h);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        let d = 0; for(let i=1; i<s.length; i++) d += Math.abs(s[i]-s[i-1]);
                        secretKey = CryptoJS.SHA256(d.toString()).toString();
                        nodeId.value = 'NODE_' + secretKey.substring(0,4);
                        isLogged.value = true;
                        initMQTT();
                    }, 2000);
                };

                const initMQTT = () => {
                    client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                    client.on('connect', () => { connected.value = true; client.subscribe('hram_108_global'); log("Эфир активен"); });
                    client.on('message', (t, m) => {
                        try {
                            const d = JSON.parse(m.toString());
                            messages.value.push(d);
                        } catch(e) {}
                    });
                };

                const sendMsg = (type = 'TEXT', customData = null) => {
                    if(!input.value && !customData) return;
                    const payload = customData || { id: Date.now(), sender: nodeId.value, type, body: input.value };
                    client.publish('hram_108_global', JSON.stringify(payload));
                    input.value = '';
                };

                const createSlot = () => {
                    sendMsg('SLOT', { id: Date.now(), sender: nodeId.value, type: 'SLOT', ...slotData.value });
                    showSlotModal.value = false;
                    log("Слот опубликован");
                };

                const startEmpathy = () => {
                    empStep.value = 0; empQuest.value = "1+1=2?"; calib.length = 0; empathyActive.value = true;
                };

                const recEmp = (ans) => {
                    let m = 0; const h = e => m = Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2);
                    window.addEventListener('devicemotion', h);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        if(empStep.value === 'target') {
                            const p = Math.max(0, Math.min(100, 100 - (Math.abs(m-baseJ.value)*60)));
                            sendMsg('TEXT', { id: Date.now(), sender: nodeId.value, type: 'VERIFY', body: 'Верификация пройдена', truth: p.toFixed(0) });
                            empathyActive.value = false; return;
                        }
                        calib.push(m); empStep.value++;
                        if(empStep.value < 3) empQuest.value = "Вы человек?";
                        else { baseJ.value = calib.reduce((a,b)=>a+b,0)/3; empStep.value = 'target'; empQuest.value = "СДЕЛКА ЧЕСТНАЯ?"; }
                    }, 200);
                };

                const buySlot = (slot) => {
                    input.value = `ЗАПРОС НА ПОКУПКУ: ${slot.title}`;
                    sendMsg('ORDER');
                    log("Запрос отправлен");
                };

                return { isLogged, nodeId, connected, input, logs, messages, showSettings, showSlotModal, slotData, empathyActive, empStep, empQuest, entropyBoot, sendMsg, createSlot, startEmpathy, recEmp, buySlot };
            }
        }).mount('#app');
    </script>
</body>
</html>
