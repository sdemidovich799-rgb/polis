<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ХРАМ 5.9</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #0b141a; --accent: #00a884; --text: #e9edef; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100%; width: 100%; overflow: hidden; }
        
        /* Жесткая блокировка стартового экрана через чистый CSS */
        #boot-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box;
        }
        
        .big-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 25px; border-radius: 20px; font-weight: bold; font-size: 20px; 
            width: 100%; cursor: pointer; -webkit-appearance: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .big-btn:active { background: #008f70; transform: translateY(2px); }

        #app { display: none; height: 100vh; flex-direction: column; }
        .main-ui { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .header { background: #111b21; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .card { background: #111b21; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        input { background: #2a3942; border: none; color: white; padding: 15px; border-radius: 10px; width: 100%; margin: 10px 0; font-size: 16px; }
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 8px; max-width: 85%; }
        .own { align-self: flex-end; background: #054740; border-right: 4px solid var(--accent); }
        .ext { align-self: flex-start; background: #202c33; border-left: 4px solid #34b7f1; }
    </style>
</head>
<body>

    <!-- Слой детонатора на чистом HTML/JS -->
    <div id="boot-layer">
        <h1 style="margin-bottom: 40px;">ХРАМ 5.9</h1>
        <button class="big-btn" onclick="detonate()">АКТИВИРОВАТЬ ХРАМ</button>
        <p id="boot-status" style="margin-top: 30px; color: #8696a0; text-align: center; font-size: 14px;">
            Ожидание инициации...
        </p>
    </div>

    <!-- Основной интерфейс Vue -->
    <div id="app">
        <div class="header">
            <div style="font-weight: bold;">{{ nodeId }}</div>
            <div @click="showSettings = !showSettings" style="font-size: 24px;">⚙️</div>
        </div>

        <div class="main-ui">
            <div v-if="showSettings" class="card">
                <button class="big-btn" style="background: #34b7f1; margin-bottom: 10px; padding: 15px;" @click="startEmp">🧠 Эмпатия</button>
                <button class="big-btn" style="padding: 15px;" @click="showSlot = true">📦 Создать Слот</button>
            </div>

            <div v-for="m in messages" :key="m.id" class="msg" :class="m.sender === nodeId ? 'own' : 'ext'">
                <div v-if="m.type === 'SLOT'">
                    <h3 style="color: var(--accent); margin: 5px 0;">🛒 {{ m.title }}</h3>
                    <p>{{ m.body }}</p>
                    <b>{{ m.price }} XMR</b>
                </div>
                <div v-else>{{ m.body }}</div>
                <div v-if="m.truth" style="color: #0f0; font-size: 11px;">Искренность: {{ m.truth }}%</div>
            </div>
        </div>

        <div class="header" style="padding: 10px;">
            <input v-model="input" @keyup.enter="send('TEXT')" placeholder="Введите сообщение...">
        </div>
    </div>

    <script>
        // ЧИСТЫЙ JAVASCRIPT ДЛЯ ВХОДА (БЕЗ VUE)
        async function detonate() {
            const status = document.getElementById('boot-status');
            const layer = document.getElementById('boot-layer');
            const appDiv = document.getElementById('app');
            
            status.innerText = "Запрос доступа к сенсорам...";
            
            try {
                if (window.DeviceMotionEvent && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const res = await DeviceMotionEvent.requestPermission();
                    if (res !== 'granted') {
                        status.innerText = "ОШИБКА: Доступ отклонен.";
                        return;
                    }
                }
                
                status.innerText = "Снятие ритма... Не шевелитесь (3 сек)";
                
                // Запуск Vue и инициация
                window.initHram(); 
                
                setTimeout(() => {
                    layer.style.display = 'none';
                    appDiv.style.display = 'flex';
                }, 3000);
                
            } catch (e) {
                // Если ошибка — просто пускаем (для desktop или старых iOS)
                layer.style.display = 'none';
                appDiv.style.display = 'flex';
                window.initHram();
            }
        }

        // ИНИЦИАЛИЗАЦИЯ VUE ВНУТРИ ГЛОБАЛЬНОЙ ФУНКЦИИ
        window.initHram = function() {
            const { createApp, ref } = Vue;
            createApp({
                setup() {
                    const nodeId = ref(''), input = ref(''), messages = ref([]), showSettings = ref(false), showSlot = ref(false);
                    let client, secret = '';

                    // Замер гироскопа
                    let s = [];
                    const h = e => { if(e.accelerationIncludingGravity) s.push(Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2)); };
                    window.addEventListener('devicemotion', h);
                    
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        let d = 0; for(let i=1; i<s.length; i++) d += Math.abs(s[i]-s[i-1]);
                        if(d === 0) d = Math.random();
                        secret = CryptoJS.SHA256(d.toString()).toString();
                        nodeId.value = 'NODE_' + secret.substring(0,4).toUpperCase();
                        
                        // MQTT
                        client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                        client.on('connect', () => client.subscribe('hram_final_v59'));
                        client.on('message', (t, m) => { try { messages.value.push(JSON.parse(m.toString())); } catch(e){} });
                    }, 2500);

                    const send = (type, data = null) => {
                        const p = data || { id: Date.now(), sender: nodeId.value, type, body: input.value };
                        client.publish('hram_final_v59', JSON.stringify(p));
                        input.value = '';
                    };

                    return { nodeId, input, messages, showSettings, showSlot, send };
                }
            }).mount('#app');
        };
    </script>
</body>
</html>
