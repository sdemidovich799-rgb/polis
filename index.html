<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ХРАМ 5.7</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #00a884; --text: #e9edef; --dim: #8696a0; --danger: #f15c6d; --blue: #34b7f1; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        .header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; background: #555; }
        .online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .main { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 8px 0; font-size: 16px; display: block; }
        .btn:active { transform: scale(0.97); background: #008f70; }
        .terminal { background: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 8px; font-size: 11px; margin-top: 10px; text-align: left; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 30px; display: flex; flex-direction: column; justify-content: center; }
        input { background: #2a3942; border: none; color: white; padding: 14px; border-radius: 10px; width: 100%; margin: 10px 0; font-size: 16px; }
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 5px; max-width: 85%; }
        .msg-own { align-self: flex-end; background: #054740; border-right: 4px solid var(--accent); }
        .msg-ext { align-self: flex-start; background: var(--panel); border-left: 4px solid var(--blue); }
    </style>
</head>
<body>
    <div id="app">
        <!-- ЭКРАН ВХОДА -->
        <div v-if="!isLogged" class="modal">
            <h1 style="text-align:center">ХРАМ 5.7</h1>
            <p style="text-align:center; color:var(--dim)">Нажмите кнопку для активации сенсоров и входа</p>
            <button class="btn" @click="entropyBoot">🌀 ВОЙТИ В ХРАМ</button>
            <div class="terminal" v-if="logs.length">
                <div v-for="log in logs">> {{ log }}</div>
            </div>
            <p style="font-size:12px; color:var(--dim); margin-top:20px">Инструкция: если кнопки не активны, откройте страницу через «На экран Домой» в Safari.</p>
        </div>

        <!-- ОСНОВНОЙ ЭКРАН -->
        <template v-else>
            <div class="header">
                <div><span class="status-dot" :class="{online: connected}"></span> {{ nodeId }}</div>
                <div @click="showSettings = !showSettings" style="font-size:24px">⚙️</div>
            </div>

            <div class="main">
                <div v-if="showSettings" class="card">
                    <button class="btn" style="background:var(--blue)" @click="startEmpathy">🧠 Детектор Эмпатии</button>
                    <button class="btn" @click="showSlotModal = true">📦 Создать Слот</button>
                    <button class="btn" style="background:#444" @click="burn">🗑 Сброс</button>
                </div>

                <div v-for="m in messages" :key="m.id" class="msg" :class="m.sender === nodeId ? 'msg-own' : 'msg-ext'">
                    <div style="font-size:10px; color:var(--dim)">{{ m.sender }}</div>
                    <div v-if="m.type === 'SLOT'">
                        <h4 style="margin:0; color:var(--accent)">🛒 {{ m.title }}</h4>
                        <p>{{ m.body }}</p>
                        <b>{{ m.price }} XMR</b>
                        <button class="btn" style="margin-top:10px" @click="buy(m)">Купить</button>
                    </div>
                    <div v-else>{{ m.body }}</div>
                    <div v-if="m.truth" style="font-size:11px; color:#0f0">Искренность: {{ m.truth }}%</div>
                </div>
            </div>

            <div class="header" style="border-top:1px solid rgba(255,255,255,0.1)">
                <input v-model="input" @keyup.enter="send('TEXT')" placeholder="Введите текст...">
            </div>
        </template>

        <!-- ЭМПАТИЯ -->
        <div v-if="empActive" class="modal">
            <h3 style="text-align:center">{{ empStep === 'target' ? 'ЦЕЛЬ' : `КАЛИБРОВКА ${empStep+1}/3` }}</h3>
            <h2 style="text-align:center; margin:40px 0">{{ empQuest }}</h2>
            <div style="display:flex; gap:15px">
                <button class="btn" @click="handleEmp(true)">✅ ДА</button>
                <button class="btn" style="background:var(--danger)" @click="handleEmp(false)">❌ НЕТ</button>
            </div>
            <button class="btn" style="background:#444; margin-top:20px" @click="empActive = false">ОТМЕНА</button>
        </div>

        <!-- СЛОТ -->
        <div v-if="showSlotModal" class="modal">
            <h3>НОВЫЙ СЛОТ</h3>
            <input v-model="slot.title" placeholder="Товар">
            <input v-model="slot.body" placeholder="Описание">
            <input type="number" v-model="slot.price" placeholder="Цена">
            <button class="btn" @click="publishSlot">Опубликовать</button>
            <button class="btn" style="background:#444" @click="showSlotModal = false">Назад</button>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const isLogged = ref(false), nodeId = ref(''), connected = ref(false), input = ref(''), logs = ref([]), messages = ref([]), showSettings = ref(false);
                const showSlotModal = ref(false), slot = ref({title:'', body:'', price:''}), empActive = ref(false), empStep = ref(0), empQuest = ref(''), baseJ = ref(0), calib = [];
                let client, secret = '';

                const log = m => { logs.value.unshift(m); if(logs.value.length>5) logs.value.pop(); };

                const entropyBoot = async () => {
                    log("Активация сенсоров...");
                    try {
                        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                            const permission = await DeviceMotionEvent.requestPermission();
                            if (permission !== 'granted') { log("Доступ отклонен"); return; }
                        }
                        log("Замер ритма (3 сек)...");
                        let s = [];
                        const h = e => { if(e.accelerationIncludingGravity) s.push(Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2)); };
                        window.addEventListener('devicemotion', h);
                        setTimeout(() => {
                            window.removeEventListener('devicemotion', h);
                            let d = 0; for(let i=1; i<s.length; i++) d += Math.abs(s[i]-s[i-1]);
                            if(d === 0) d = Math.random(); // Fallback если телефон на столе
                            secret = CryptoJS.SHA256(d.toString()).toString();
                            nodeId.value = 'NODE_' + secret.substring(0,4).toUpperCase();
                            isLogged.value = true;
                            init();
                        }, 3000);
                    } catch (e) { log("Ошибка входа: " + e); }
                };

                const init = () => {
                    client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                    client.on('connect', () => { connected.value = true; client.subscribe('hram_v57'); log("Эфир онлайн"); });
                    client.on('message', (t, m) => { try { messages.value.push(JSON.parse(m.toString())); } catch(e){} });
                };

                const send = (type, data = null) => {
                    const p = data || { id: Date.now(), sender: nodeId.value, type, body: input.value };
                    client.publish('hram_v57', JSON.stringify(p));
                    input.value = '';
                };

                const publishSlot = () => { send('SLOT', { id: Date.now(), sender: nodeId.value, type: 'SLOT', ...slot.value }); showSlotModal.value = false; };

                const startEmpathy = () => { empStep.value = 0; empQuest.value = "1 + 1 = 2?"; calib.length = 0; empActive.value = true; };

                const handleEmp = (ans) => {
                    let m = 0; const h = e => { if(e.accelerationIncludingGravity) m = Math.sqrt(e.accelerationIncludingGravity.x**2 + e.accelerationIncludingGravity.y**2 + e.accelerationIncludingGravity.z**2); };
                    window.addEventListener('devicemotion', h);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        if(empStep.value === 'target') {
                            const truth = Math.max(0, Math.min(100, 100 - (Math.abs(m-baseJ.value)*80))).toFixed(0);
                            send('TEXT', { id: Date.now(), sender: nodeId.value, type: 'VERIFY', body: 'ПОДТВЕРЖДЕНО ЭМПАТИЕЙ', truth });
                            empActive.value = false; return;
                        }
                        calib.push(m); empStep.value++;
                        if(empStep.value < 3) empQuest.value = "Вы человек?";
                        else { baseJ.value = calib.reduce((a,b)=>a+b,0)/3; empStep.value = 'target'; empQuest.value = "ВАШИ НАМЕРЕНИЯ ЧИСТЫ?"; }
                    }, 250);
                };

                const buy = (s) => { input.value = `ЗАПРОС: ${s.title}`; send('TEXT'); };
                const burn = () => location.reload();

                return { isLogged, nodeId, connected, input, logs, messages, showSettings, showSlotModal, slot, empActive, empStep, empQuest, entropyBoot, send, publishSlot, startEmpathy, handleEmp, buy, burn };
            }
        }).mount('#app');
    </script>
</body>
</html>
