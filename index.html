<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ХРАМ 5.6 | ПОЛИС</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #00a884; --text: #e9edef; --dim: #8696a0; --danger: #f15c6d; --blue: #34b7f1; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        
        /* Стартовая страница */
        .intro { padding: 30px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .pwa-hint { background: var(--panel); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px dashed var(--accent); }
        
        .header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; background: #555; }
        .online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        
        .main { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-own { align-self: flex-end; border-right: 4px solid var(--accent); background: #054740; max-width: 85%; }
        .msg-ext { align-self: flex-start; border-left: 4px solid var(--blue); max-width: 85%; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 8px 0; font-size: 16px; }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        
        .terminal { background: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 8px; font-size: 11px; max-height: 120px; overflow-y: auto; border: 1px solid #333; text-align: left; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        input { background: #2a3942; border: none; color: white; padding: 14px; border-radius: 10px; width: 100%; margin: 10px 0; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 0. ИНСТРУКЦИЯ PWA -->
        <div v-if="!isStandalone && !isLogged" class="intro">
            <h1>ХРАМ 5.6</h1>
            <p>Система должна быть изолирована от браузера.</p>
            <div class="pwa-hint">
                <p>Нажми <strong>«Поделиться»</strong> <br> (квадрат со стрелкой)</p>
                <p>Выбери <strong>«На экран Домой»</strong></p>
            </div>
            <button class="btn btn-outline" style="margin-top:20px" @click="isStandalone = true">Я уже зашел из Домой</button>
        </div>

        <!-- 1. АВТОРИЗАЦИЯ -->
        <div v-if="isStandalone && !isLogged" class="modal">
            <h2>ВХОД В ХРАМ</h2>
            <button class="btn" @click="entropyBoot">🌀 Снять ритм гироскопа</button>
            <div class="terminal" v-if="logs.length">
                <div v-for="log in logs">> {{ log }}</div>
            </div>
        </div>

        <!-- 2. ОСНОВНОЙ ХРАМ -->
        <template v-else-if="isLogged">
            <div class="header">
                <div><span class="status-dot" :class="{online: connected}"></span> {{ nodeId }}</div>
                <div @click="showSettings = !showSettings" style="font-size: 20px;">⚙️</div>
            </div>

            <div class="main">
                <!-- Настройки -->
                <div v-if="showSettings" class="card">
                    <h3>Управление Узлом</h3>
                    <button class="btn btn-outline" @click="startEmpathy">🧠 Детектор Эмпатии</button>
                    <button class="btn" @click="showSlotModal = true">📦 Создать Слот</button>
                    <button class="btn btn-outline" style="color:var(--danger); border-color:var(--danger)" @click="burn">🗑 Сжечь сессию</button>
                </div>

                <!-- Сообщения и Слоты -->
                <div v-for="m in messages" :key="m.id" class="card" :class="m.sender === nodeId ? 'msg-own' : 'msg-ext'">
                    <div style="font-size:10px; color:var(--dim); margin-bottom:5px;">{{ m.sender }}</div>
                    <div v-if="m.type === 'SLOT'">
                        <h4 style="margin:0; color:var(--accent)">🛒 {{ m.title }}</h4>
                        <p style="margin:5px 0">{{ m.body }}</p>
                        <div style="font-size:1.2em; font-weight:bold">{{ m.price }} XMR</div>
                        <button v-if="m.sender !== nodeId" class="btn" style="margin-top:10px" @click="buy(m)">Вступить в сделку</button>
                    </div>
                    <div v-else>{{ m.body }}</div>
                    <div v-if="m.truth" style="font-size:11px; color:#0f0; margin-top:5px">✓ Искренность: {{ m.truth }}%</div>
                </div>
            </div>

            <div class="header" style="border-top:1px solid rgba(255,255,255,0.1)">
                <input v-model="input" @keyup.enter="send('TEXT')" placeholder="Введите сообщение...">
            </div>
        </template>

        <!-- МОДАЛКИ -->
        <div v-if="showSlotModal" class="modal">
            <h3>НОВЫЙ СЛОТ</h3>
            <input v-model="slot.title" placeholder="Что предлагаете?">
            <input v-model="slot.body" placeholder="Описание и условия">
            <input type="number" v-model="slot.price" placeholder="Цена в XMR">
            <button class="btn" @click="publishSlot">Опубликовать</button>
            <button class="btn btn-outline" @click="showSlotModal = false">Отмена</button>
        </div>

        <div v-if="empActive" class="modal" style="text-align:center">
            <h3>{{ empStep === 'target' ? 'ЦЕЛЕВОЙ ВОПРОС' : `КАЛИБРОВКА ${empStep+1}/3` }}</h3>
            <h2 style="margin:30px 0">{{ empQuest }}</h2>
            <div style="display:flex; gap:15px">
                <button class="btn" @click="handleEmp(true)">✅ ДА</button>
                <button class="btn" style="background:var(--danger)" @click="handleEmp(false)">❌ НЕТ</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const isStandalone = ref(window.navigator.standalone || false);
                const isLogged = ref(false), nodeId = ref(''), connected = ref(false);
                const input = ref(''), logs = ref([]), messages = ref([]), showSettings = ref(false);
                const showSlotModal = ref(false), slot = ref({title:'', body:'', price:''});
                const empActive = ref(false), empStep = ref(0), empQuest = ref(''), baseJ = ref(0), calib = [];
                let client, secret = '';

                const log = m => { logs.value.unshift(m); if(logs.value.length>6) logs.value.pop(); };

                const entropyBoot = async () => {
                    log("Инициация... Держите телефон 3 сек.");
                    if(window.DeviceMotionEvent?.requestPermission) {
                        const res = await DeviceMotionEvent.requestPermission();
                        if(res !== 'granted') return log("Нет доступа к гироскопу");
                    }
                    let s = [];
                    const h = e => {
                        const a = e.accelerationIncludingGravity;
                        if(a) s.push(Math.sqrt(a.x**2 + a.y**2 + a.z**2));
                    };
                    window.addEventListener('devicemotion', h);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        let d = 0; for(let i=1; i<s.length; i++) d += Math.abs(s[i]-s[i-1]);
                        if(d === 0) return log("Ошибка: телефон был неподвижен");
                        secret = CryptoJS.SHA256(d.toString()).toString();
                        nodeId.value = 'NODE_' + secret.substring(0,6).toUpperCase();
                        isLogged.value = true;
                        init();
                    }, 3000);
                };

                const init = () => {
                    client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                    client.on('connect', () => { 
                        connected.value = true; 
                        client.subscribe('hram_global_v56'); 
                        log("Эфир синхронизирован");
                    });
                    client.on('message', (t, m) => {
                        try { messages.value.push(JSON.parse(m.toString())); } catch(e) {}
                    });
                };

                const send = (type, data = null) => {
                    const p = data || { id: Date.now(), sender: nodeId.value, type, body: input.value };
                    client.publish('hram_global_v56', JSON.stringify(p));
                    input.value = '';
                };

                const publishSlot = () => {
                    send('SLOT', { id: Date.now(), sender: nodeId.value, type: 'SLOT', ...slot.value });
                    showSlotModal.value = false;
                    log("Слот опубликован");
                };

                const startEmpathy = () => {
                    empStep.value = 0; empQuest.value = "1 + 1 = 2?"; calib.length = 0; empActive.value = true;
                };

                const handleEmp = (ans) => {
                    let m = 0;
                    const h = e => {
                        const a = e.accelerationIncludingGravity;
                        if(a) m = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
                    };
                    window.addEventListener('devicemotion', h);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', h);
                        if(empStep.value === 'target') {
                            const diff = Math.abs(m - baseJ.value);
                            const truth = Math.max(0, Math.min(100, 100 - (diff * 70))).toFixed(0);
                            send('TEXT', { id: Date.now(), sender: nodeId.value, type: 'VERIFY', body: 'ПОДТВЕРЖДЕНО ЭМПАТИЕЙ', truth });
                            empActive.value = false; return;
                        }
                        calib.push(m); empStep.value++;
                        if(empStep.value < 3) empQuest.value = (empStep.value === 1) ? "Вы человек?" : "Сейчас май?";
                        else { 
                            baseJ.value = calib.reduce((a,b)=>a+b,0)/calib.length; 
                            empStep.value = 'target'; 
                            empQuest.value = "ВАШИ НАМЕРЕНИЯ ЧИСТЫ?"; 
                        }
                    }, 300);
                };

                const buy = (s) => { input.value = `СДЕЛКА: Хочу купить ${s.title}`; send('TEXT'); };
                const burn = () => location.reload();

                return { isStandalone, isLogged, nodeId, connected, input, logs, messages, showSettings, showSlotModal, slot, empActive, empStep, empQuest, entropyBoot, send, publishSlot, startEmpathy, handleEmp, buy, burn };
            }
        }).mount('#app');
    </script>
</body>
</html>
