<!DOCTYPE html>
<html lang="ru" style="background-color: #0b141a;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b141a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>108</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        input, button { user-select: auto; }
        html, body { position: fixed; inset: 0; width: 100%; height: 100%; height: -webkit-fill-available; height: 100dvh; background: #0b141a; color: #e9edef; font-family: monospace, sans-serif; overflow: hidden; }
        #app { width: 100%; max-width: 800px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .pwa-gate { position: absolute; inset:0; z-index: 9999; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .gate-card { background: #111b21; padding: 32px 24px; border-radius: 16px; border: 1px solid #2d3f4b; max-width: 320px; width: 100%; }
        
        .safe-panel { display: flex; flex-direction: column; height: 100%; padding: 20px; justify-content: space-between;}
        .pin-grid { display: flex; gap: 12px; justify-content: center; margin-top: 40px;}
        .pin-slot { width: 32px; height: 48px; border-bottom: 2px solid #2d3f4b; font-size: 32px; color: transparent; text-align: center; }
        .pin-slot.filled { color: #00a884; border-bottom-color: #00a884; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 280px; margin: 0 auto 40px; }
        .key-btn { background: transparent; border: none; color: #8f9ca3; font-size: 32px; padding: 16px; border-radius: 50%; }
        
        .header { padding: calc(env(safe-area-inset-top) + 12px) 16px 12px; background: #202c33; border-bottom: 1px solid #2d3f4b; display: flex; justify-content: space-between; align-items: center; }
        .monad { width: 16px; height: 16px; border: 2px solid #ea0038; border-radius: 50%; opacity: 0.5; transition: 0.3s; }
        .monad.pulse { border-color: #00a884; background: #00a884; opacity: 1; box-shadow: 0 0 10px #00a884;}
        
        .threads-panel { flex: 1; overflow-y: auto; }
        .thread-item { padding: 16px; border-bottom: 1px solid #202c33; display: flex; justify-content: space-between; }
        
        .chat-panel { position: absolute; inset:0; background: #0b141a; display: flex; flex-direction: column; z-index: 10; }
        .chat-header { padding: calc(env(safe-area-inset-top) + 8px) 16px 8px; background: #202c33; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #2d3f4b; }
        .messages-box { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message-row { display: flex; flex-direction: column; max-width: 85%; }
        .my-message-row { align-self: flex-end; } .other-message-row { align-self: flex-start; }
        .message { padding: 8px 12px; border-radius: 12px; font-size: 15px; word-wrap: break-word; }
        .my-message { background: #005c4b; } .other-message { background: #202c33; }
        .msg-footer { font-size: 10px; color: #8f9ca3; text-align: right; margin-top: 4px; }
        
        .action-bar { padding: 8px 16px calc(env(safe-area-inset-bottom) + 8px); background: #202c33; display: flex; gap: 8px; align-items: center; }
        .input-wrapper { flex: 1; position: relative; }
        .input-wrapper input { width: 100%; background: #2a3942; border: none; color: #fff; padding: 12px 16px; border-radius: 24px; font-size: 16px; outline: none; }
        .btn-circle { background: #00a884; color: #111b21; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; font-weight: bold; }
        .btn-tool { background: transparent; border: 1px solid #8f9ca3; color: #8f9ca3; border-radius: 16px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
        .btn-tool.active { background: #00a884; color: #111b21; border-color: #00a884; }
        .modal { position: fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111b21; padding: 24px; border-radius: 16px; width: 100%; border: 1px solid #2d3f4b; display: flex; flex-direction: column; gap: 12px; }
        .modal-content input { padding: 12px; background: #202c33; border: none; color: #fff; border-radius: 8px; }
        
        #optical-canvas { position: fixed; top:0; left:0; width: 100vw; height: 100vh; z-index: 9999; pointer-events: none; display: none; }
    </style>
</head>
<body>
    <canvas id="optical-canvas"></canvas>
    
    <div id="app">
        <!-- ВХОД -->
        <div v-if="!loggedIn" class="safe-panel">
            <div style="text-align:center; margin-top:20vh;">
                <div class="monad pulse" style="margin: 0 auto;"></div>
                <div class="pin-grid">
                    <div v-for="(_, i) in 6" :key="i" class="pin-slot" :class="{'filled': pinDigits[i] !== ''}">*</div>
                </div>
            </div>
            <div class="keypad">
                <button v-for="n in 9" class="key-btn" @click="addPin(n)">{{n}}</button>
                <div></div><button class="key-btn" @click="addPin(0)">0</button><button class="key-btn" style="color:#ea0038" @click="clearPin">⌫</button>
            </div>
        </div>
        <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
        <div v-else style="display:flex; flex-direction:column; height:100%;">
            <div class="header">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div class="monad" :class="{'pulse': mqttOnline}"></div>
                    <span style="color:#00a884; font-weight:bold; font-size:14px;" @click="copyMyId">МОЙ ID</span>
                </div>
                <button class="btn-circle" style="width:32px; height:32px; font-size:20px; line-height:0;" @click="showAdd=true">+</button>
            </div>
            <div class="threads-panel" v-if="!activeThread">
                <div v-for="t in threads" :key="t.peerId" class="thread-item" @click="openThread(t)">
                    <div>
                        <div style="color:#e9edef; font-weight:bold;">{{ t.name }}</div>
                        <div style="color:#8f9ca3; font-size:12px;">{{ t.type === 'citadel' ? 'Чертог' : 'Узел связи' }}</div>
                    </div>
                    <div v-if="t.unread" style="color:#00a884; font-weight:bold; font-size:12px;">+{{t.unread}}</div>
                </div>
            </div>
            <!-- ЧАТ -->
            <div class="chat-panel" v-if="activeThread">
                <div class="chat-header">
                    <button style="background:none; border:none; color:#00a884; font-size:24px;" @click="activeThread=null">‹</button>
                    <div style="flex:1;">
                        <div style="color:#e9edef; font-weight:bold;">{{ activeThread.name }}</div>
                    </div>
                    <button v-if="activeThread.type !== 'citadel'" class="btn-tool" @click="showWallet=true">Финансы</button>
                </div>
                
                <div class="messages-box" ref="box">
                    <div v-for="m in messages[activeThread.peerId]" :key="m.id" class="message-row" :class="m.isMe ? 'my-message-row':'other-message-row'">
                        <div class="message" :class="m.isMe?'my-message':'other-message'" @click="m.status===2?deleteMsg(m.id):null">
                            {{ m.text }}
                        </div>
                        <div class="msg-footer">
                            <span v-if="m.isMe" :style="{color: m.status===3 ? '#00a884' : '#ea0038'}">
                                {{ m.status===3 ? '✓ Открыто' : '⏳ Замок' }}
                            </span>
                        </div>
                    </div>
                </div>
                <div class="action-bar" v-if="activeThread.type !== 'citadel'">
                    <!-- Панель инструментов физики Земли -->
                    <div style="display:flex; gap:4px; flex-direction:column; margin-right:4px;">
                        <button class="btn-tool" @click="toggleAcousticRec">{{ isListeningAc ? '🔴 Звук' : '🎙 Звук' }}</button>
                        <button class="btn-tool" @click="toggleOpticRec">{{ isScanningOpt ? '🔴 Свет' : '👁 Свет' }}</button>
                    </div>
                    
                    <div class="input-wrapper">
                        <input v-model="inputText" placeholder="Текст..." v-if="!fieldLocked" autocomplete="off" @keyup.enter="sendMQTT">
                        <div v-else style="color:#ea0038; font-size:12px; padding:12px; text-align:center; border:1px dashed #ea0038; border-radius:24px;">ЭФИР ЗАКРЫТ (Ждем ЭХО)</div>
                    </div>
                    
                    <!-- Варианты отправки -->
                    <div style="display:flex; flex-direction:column; gap:4px;" v-if="!fieldLocked">
                        <button class="btn-circle" style="width:32px; height:32px; font-size:12px;" @click="sendMQTT" title="В эфир">➤</button>
                        <div style="display:flex; gap:2px;">
                            <button class="btn-circle" style="width:15px; height:15px; font-size:8px; line-height:0;" @click="sendAcoustic" title="Звуком">🔊</button>
                            <button class="btn-circle" style="width:15px; height:15px; font-size:8px; line-height:0;" @click="sendOptical" title="Светом">💡</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- МОДАЛКА: НОВЫЙ ЧАТ -->
            <div class="modal" v-if="showAdd" @click.self="showAdd=false">
                <div class="modal-content">
                    <h3 style="color:#00a884;">Реквизиты Узла</h3>
                    <input v-model="addName" placeholder="Имя">
                    <input v-model="addId" placeholder="ID (вставь скопированное)">
                    <button class="btn-circle" style="width:100%; border-radius:8px;" @click="createThread">Создать мост</button>
                </div>
            </div>
            <!-- МОДАЛКА: КОШЕЛЕК -->
            <div class="modal" v-if="showWallet" @click.self="showWallet=false">
                <div class="modal-content">
                    <h3 style="color:#00a884;">Финансовый Узел</h3>
                    <p style="font-size:11px; color:#8f9ca3;">Адреса друга лежат в локальном Чертоге.</p>
                    
                    <label style="color:#8f9ca3; font-size:12px;">Его Monero (XMR):</label>
                    <input v-model="walletData.xmr" placeholder="4... или 8..." @blur="saveWallet">
                    <button style="background:transparent; border:1px solid #e9edef; color:#fff; padding:8px; border-radius:8px;" @click="pay('XMR')">Отправить XMR (Deep Link)</button>
                    
                    <label style="color:#8f9ca3; font-size:12px; margin-top:10px;">Его USDT (TRC20):</label>
                    <input v-model="walletData.usdt" placeholder="T..." @blur="saveWallet">
                    <button style="background:transparent; border:1px solid #e9edef; color:#fff; padding:8px; border-radius:8px;" @click="pay('USDT')">Отправить USDT (Trust Wallet Link)</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // ==========================================
        // БАЗОВЫЕ МОДУЛИ 4.0 (Сжатие + Хранилище)
        // ==========================================
        class Crystal108 {
            collapse(text) {
                // Упрощенный генератор (для MVP 108 случайных цифр + полезная нагрузка внутри)
                // Строго 108 цифр на выход.
                let hex = '';
                for(let i=0; i<text.length; i++) {
                    let code = text.charCodeAt(i).toString(10);
                    hex += code.padStart(3, '0');
                }
                while(hex.length < 108) hex += Math.floor(Math.random()*10);
                return hex.substring(0, 108);
            }
            resonate(code108) {
                let res = '';
                for(let i=0; i<code108.length; i+=3) {
                    let num = parseInt(code108.substr(i,3), 10);
                    if(num >= 32 && num <= 1105) res += String.fromCharCode(num);
                }
                return res.replace(/[^а-яa-z0-9\s\|\.\,\!\?]/gi, '').trim(); // Фильтр мусора
            }
        }
        class Storage {
            constructor() { this.key = null; }
            auth(pin) { this.key = 'p108_'+pin; return JSON.parse(localStorage.getItem(this.key)); }
            save(data) { localStorage.setItem(this.key, JSON.stringify(data)); }
        }
        // ==========================================
        // МОДУЛЬ 1.1: АКУСТИКА (State Machine ФСК)
        // ==========================================
        class AcousticModem {
            constructor() {
                this.freqs = [600, 800, 1000, 1200, 1400, 1600, 1800, 2000, 2200, 2400]; // 0-9
                this.preamble = 2800; // Старт
                this.dur = 0.15;
                this.ctx = null;
            }
            send(code108) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                let t = this.ctx.currentTime;
                // Преамбула (2 импульса)
                this._tone(this.preamble, t); t+=this.dur;
                this._tone(this.preamble, t); t+=this.dur;
                for(let i=0; i<code108.length; i++) {
                    this._tone(this.freqs[parseInt(code108[i])], t);
                    t += this.dur;
                }
                setTimeout(()=>this.ctx.close(), (t - this.ctx.currentTime)*1000 + 500);
            }
            _tone(f, t) {
                const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                o.frequency.value = f;
                g.gain.setValueAtTime(0.5, t); g.gain.setTargetAtTime(0.001, t + this.dur - 0.02);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(t); o.stop(t+this.dur);
            }
            listen(onData) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                navigator.mediaDevices.getUserMedia({audio:true}).then(s => {
                    this.stream = s;
                    const src = this.ctx.createMediaStreamSource(s);
                    this.an = this.ctx.createAnalyser();
                    this.an.fftSize = 2048;
                    src.connect(this.an);
                    this.listening = true;
                    this.buffer = '';
                    this._loop(onData);
                });
            }
            _loop(onData) {
                if(!this.listening) return;
                const arr = new Float32Array(this.an.frequencyBinCount);
                this.an.getFloatFrequencyData(arr);
                
                // Простейший поиск пика
                let max = -Infinity, idx = -1;
                for(let i=20; i<arr.length/2; i++) {
                    if(arr[i]>max) { max = arr[i]; idx = i; }
                }
                
                let hz = idx *this.ctx.sampleRate/this.an.fftSize;
                
                // Эвристика: если громко и попадает в сетку
                if(max > -40) {
                    if(Math.abs(hz - this.preamble) < 100) this.buffer = ''; // Сброс при преамбуле
                    for(let i=0; i<10; i++) {
                        if(Math.abs(hz - this.freqs[i]) < 50) {
                            if(this.buffer.length < 108 && this.buffer.slice(-1) != i.toString()) {
                                this.buffer += i; // Простая защита от двойного чтения
                            }
                        }
                    }
                }
                
                if(this.buffer.length === 108) {
                    onData(this.buffer);
                    this.stop();
                } else {
                    requestAnimationFrame(()=>this._loop(onData));
                }
            }
            stop() {
                this.listening = false;
                if(this.stream) this.stream.getTracks().forEach(t=>t.stop());
                if(this.ctx) this.ctx.close();
            }
        }
        // ==========================================
        // МОДУЛЬ 1.2: ОПТИКА (Цветовой ФСК)
        // ==========================================
        class OpticalLink {
            constructor() {
                // 10 насыщенных цветов для чтения матрицей камеры iOS
                this.colors = ['#000', '#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f', '#fff', '#888', '#f80'];
                this.cvs = document.getElementById('optical-canvas');
                this.dur = 150; // мс на кадр
            }
            async send(code108) {
                this.cvs.style.display = 'block';
                const ctx = this.cvs.getContext('2d');
                // Преамбула белый экран
                ctx.fillStyle = '#fff'; ctx.fillRect(0,0,10000,10000); await new Promise(r=>setTimeout(r, 500));
                
                for(let i=0; i<code108.length; i++) {
                    let c = this.colors[parseInt(code108[i])];
                    ctx.fillStyle = c; ctx.fillRect(0,0,10000,10000);
                    await new Promise(r=>setTimeout(r, this.dur));
                    // Разделитель чернота
                    ctx.fillStyle = '#000'; ctx.fillRect(0,0,10000,10000);
                    await new Promise(r=>setTimeout(r, 50));
                }
                this.cvs.style.display = 'none';
            }
            // Функция сканера сложна для 1 файла (захват видео, getImageData),
            // Оставляем аппаратную заготовку на стороне отправителя, 
            // Приемник вынесен на 2 этап (сложность WebRTC камеры на iOS).
        }
        // ==========================================
        // МОДУЛЬ 3: ФИНАНСОВЫЙ ДИСПЕТЧЕР
        // ==========================================
        const WalletRouter = {
            generateXmrLink: (addr, amt) => `monero:${addr}${amt?`?tx_amount=${amt}`:''}`,
            generateUsdtLink: (addr, amt) => `trust://send?asset=c195&address=${addr}&amount=${amt||0}`
        };
        // ==========================================
        // VUE APP (ЯДРО)
        // ==========================================
        const cry = new Crystal108();
        const store = new Storage();
        new Vue({
            el: '#app',
            data: {
                loggedIn: false, pinDigits: ['','','','','',''],
                myId: '', mq: null, mqttOnline: false,
                threads: [], messages: {}, activeThread: null,
                inputText: '', fieldLocked: false,
                showAdd: false, addName: '', addId: '',
                showWallet: false, walletData: {xmr:'', usdt:''},
                modem: new AcousticModem(), optic: new OpticalLink(),
                isListeningAc: false, isScanningOpt: false
            },
            methods: {
                addPin(n) {
                    let idx = this.pinDigits.findIndex(x=>x==='');
                    if(idx>=0) {
                        this.$set(this.pinDigits, idx, n);
                        if(idx === 5) setTimeout(this.login, 100);
                    }
                },
                clearPin() { this.pinDigits = ['','','','','','']; },
                login() {
                    let pin = this.pinDigits.join('');
                    let d = store.auth(pin);
                    if(!d) {
                        this.myId = 'id_'+Math.random().toString(36).substr(2,6);
                        this.threads = [{name:'Мой Чертог', peerId:'citadel', type:'citadel'}];
                    } else {
                        this.threads = d.t; this.messages = d.m; this.myId = d.id;
                    }
                    this.loggedIn = true; this.save(); this.initMQTT();
                },
                save() { store.save({t:this.threads, m:this.messages, id:this.myId}); },
                
                initMQTT() {
                    const tops = [`polis108/node/${this.myId}`, ...this.threads.filter(t=>t.type!=='citadel').map(t=>`polis108/link/${[this.myId, t.peerId].sort().join('_')}`)];
                    this.mq = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {clientId:this.myId, clean:false});
                    this.mq.on('connect', ()=>{ this.mqttOnline=true; tops.forEach(t=>this.mq.subscribe(t,{qos:1})); });
                    this.mq.on('message', this.handleMsg);
                },
                createThread() {
                    if(!this.addId) return;
                    let th = {name: this.addName||'Анон', peerId: this.addId, type:'link', xmr:'', usdt:''};
                    this.threads.push(th); this.$set(this.messages, this.addId, []);
                    this.save(); this.showAdd=false; this.initMQTT();
                },
                openThread(t) { 
                    this.activeThread = t; t.unread = 0; 
                    this.walletData = {xmr: t.xmr||'', usdt: t.usdt||''};
                    this.checkLock(); 
                },
                
                saveWallet() {
                    this.activeThread.xmr = this.walletData.xmr;
                    this.activeThread.usdt = this.walletData.usdt;
                    this.save();
                },
                pay(cur) {
                    let url = cur==='XMR' ? WalletRouter.generateXmrLink(this.walletData.xmr) : WalletRouter.generateUsdtLink(this.walletData.usdt);
                    if(!url.includes('undefined')) window.location.href = url;
                    else alert('Нет адреса');
                },
                sendBase(payload, method) {
                    if(!payload || this.fieldLocked) return;
                    let id = Date.now();
                    let msg = {id: id, text: payload, isMe: true, status: 2};
                    this.messages[this.activeThread.peerId].push(msg);
                    this.checkLock(); this.save();
                    let fullPayload = `MSG|${this.myId}|${id}|${payload}`;
                    let code = cry.collapse(fullPayload);
                    this.inputText = '';
                    if(method === 'mqtt' && this.mqttOnline) {
                        let top = `polis108/link/${[this.myId, this.activeThread.peerId].sort().join('_')}`;
                        this.mq.publish(top, code, {qos:1, retain:false});
                    } else if(method === 'sound') {
                        this.modem.send(code);
                    } else if(method === 'light') {
                        this.optic.send(code);
                    }
                },
                sendMQTT() { this.sendBase(this.inputText, 'mqtt'); },
                sendAcoustic() { this.sendBase(this.inputText, 'sound'); },
                sendOptical() { this.sendBase(this.inputText, 'light'); },
                handleMsg(top, buff) {
                    let code = buff.toString();
                    let raw = cry.resonate(code);
                    let parts = raw.split('|');
                    
                    if(parts[0] === 'ACK') {
                        let tid = parts[1]; let mid = parseInt(parts[2]);
                        if(this.messages[tid]) {
                            let m = this.messages[tid].find(x=>x.id === mid);
                            if(m) { m.status = 3; this.checkLock(); this.save(); }
                        }
                    } 
                    else if(parts[0] === 'MSG') {
                        let sid = parts[1]; let mid = parseInt(parts[2]); let text = parts[3];
                        if(sid === this.myId) return;
                        
                        // Отстрел ЭХА обратно
                        if(this.mqttOnline) {
                            this.mq.publish(`polis108/link/${[this.myId, sid].sort().join('_')}`, cry.collapse(`ACK|${this.myId}|${mid}`), {qos:1});
                        }
                        
                        let th = this.threads.find(t=>t.peerId === sid);
                        if(!th) return; // Спам-фильтр
                        if(!this.messages[sid].some(x=>x.id===mid)) {
                            this.messages[sid].push({id:mid, text:text, isMe:false});
                            if(this.activeThread?.peerId !== sid) th.unread = (th.unread||0)+1;
                            this.save();
                        }
                    }
                },
                
                toggleAcousticRec() {
                    if(this.isListeningAc) { this.modem.stop(); this.isListeningAc=false; }
                    else {
                        this.isListeningAc = true;
                        this.modem.listen((code)=>{
                            let payload = cry.resonate(code).split('|')[3];
                            if(payload) this.messages[this.activeThread.peerId].push({id:Date.now(), text: `[Звук] ${payload}`, isMe:false});
                            this.isListeningAc = false;
                        });
                    }
                },
                toggleOpticRec() { alert('Сканнер камеры в разработке. Используйте звук.'); },
                checkLock() {
                    if(!this.activeThread || this.activeThread.type==='citadel') this.fieldLocked=false;
                    else {
                        let myL = this.messages[this.activeThread.peerId].filter(x=>x.isMe).slice(-1)[0];
                        this.fieldLocked = myL && myL.status === 2;
                    }
                },
                copyMyId() { navigator.clipboard.writeText(this.myId); alert('ID скопирован'); },
                deleteMsg(id) { 
                    this.messages[this.activeThread.peerId] = this.messages[this.activeThread.peerId].filter(x=>x.id!==id); 
                    this.checkLock(); this.save(); 
                }
            }
        });
    </script>
</body>
</html>
